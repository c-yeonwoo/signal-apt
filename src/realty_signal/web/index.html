<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>아파트 시그널 맵</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --txt:#e6e8ee; --dim:#8b93a7; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
         background:var(--bg); color:var(--txt); }
  header { padding:10px 18px; border-bottom:1px solid var(--line); display:flex;
           align-items:center; gap:14px; flex-wrap:wrap; }
  header h1 { font-size:17px; margin:0; white-space:nowrap; }
  header .date { color:var(--dim); font-size:12px; white-space:nowrap; }
  #search { flex:0 0 200px; padding:7px 12px; background:var(--panel); border:1px solid var(--line);
            border-radius:8px; color:var(--txt); outline:none; }
  .filters { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { padding:4px 10px; border:1px solid var(--line); border-radius:14px; cursor:pointer;
          background:var(--panel); color:var(--dim); font-size:12px; user-select:none; }
  .chip.on { color:#fff; border-color:#3b82f6; }
  #refresh { margin-left:auto; padding:7px 14px; border:1px solid #3b82f6; border-radius:8px;
             background:#1e293b; color:#bfdbfe; cursor:pointer; font-size:13px; white-space:nowrap; }
  #refresh:disabled { opacity:.5; cursor:wait; }
  .wrap { display:flex; height:calc(100vh - 53px); }
  .side { width:248px; border-right:1px solid var(--line); overflow:auto; }
  .row { padding:9px 12px; border-bottom:1px solid var(--line); cursor:pointer; display:flex;
         align-items:center; gap:8px; flex-wrap:wrap; }
  .row:hover, .row.sel { background:#1d2230; }
  .row .nm { font-weight:600; }
  .row .mn { width:100%; color:var(--dim); font-size:11px; }
  .badge { font-size:11px; padding:2px 7px; border-radius:5px; font-weight:700; white-space:nowrap; }
  .STRONG_BUY{background:#16a34a;color:#fff;} .BUY{background:#22c55e33;color:#4ade80;}
  .WATCH{background:#eab30833;color:#fbbf24;} .NEUTRAL{background:#33415533;color:#94a3b8;}
  .SELL_RISK{background:#ef444433;color:#f87171;}
  .main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #chart { flex:1; }
  .footer { padding:8px 16px 12px; border-top:1px solid var(--line); display:flex;
            align-items:center; gap:14px; flex-wrap:wrap; }
  .reasons { display:flex; gap:6px; flex-wrap:wrap; }
  .rchip { font-size:12px; padding:3px 9px; border-radius:12px; background:#1d2230;
           border:1px solid var(--line); }
  .zlegend { display:flex; gap:4px; margin-left:auto; }
  .zsw { font-size:11px; padding:2px 8px; border-radius:10px; cursor:help; color:#0f1115; font-weight:600; }
</style>
</head>
<body>
<header>
  <h1>아파트 매수·매도 시그널 맵</h1>
  <span class="date" id="date"></span>
  <input id="search" placeholder="지역 검색…" />
  <div class="filters" id="filters"></div>
  <button id="refresh" onclick="doRefresh()">↻ 데이터 갱신</button>
</header>
<div class="wrap">
  <div class="side"><div id="list"></div></div>
  <div class="main">
    <div id="chart"></div>
    <div class="footer">
      <span id="sigbadge"></span>
      <div class="reasons" id="reasons"></div>
      <div class="zlegend" id="zlegend"></div>
    </div>
  </div>
</div>
<script>
const SIGNALS = ["STRONG_BUY","BUY","WATCH","NEUTRAL","SELL_RISK"];
let active = new Set(["STRONG_BUY","BUY","WATCH","SELL_RISK"]);
let allSignals = [], selected = null, meta = null;
const chart = echarts.init(document.getElementById('chart'), 'dark');
window.addEventListener('resize', () => chart.resize());
const badge = s => `<span class="badge ${s}">${s}</span>`;

function renderFilters(){
  const f = document.getElementById('filters'); f.innerHTML = '';
  SIGNALS.forEach(s => {
    const el = document.createElement('span');
    el.className = 'chip' + (active.has(s)?' on':''); el.textContent = s;
    el.onclick = () => { active.has(s)?active.delete(s):active.add(s); renderFilters(); renderList(); };
    f.appendChild(el);
  });
}

function renderList(){
  const q = document.getElementById('search').value.trim();
  const list = document.getElementById('list'); list.innerHTML = '';
  allSignals.filter(r => active.has(r.signal)).filter(r => !q || r.region.includes(q))
    .forEach(r => {
      const row = document.createElement('div');
      row.className = 'row' + (selected===r.region?' sel':'');
      const js = r['전세수급']==null?'–':r['전세수급'];
      const idx = r['매수우위지수']==null?'–':r['매수우위지수'];
      const sp = r['공급압력']==null?'':` · 입주 ${r['공급압력']}x`;
      row.innerHTML = `<span class="nm">${r.region}</span>${badge(r.signal)}
        <span class="mn">전세 ${js} · 매수우위 ${idx}${sp}</span>`;
      row.onclick = () => selectRegion(r.region);
      list.appendChild(row);
    });
}

function renderZoneLegend(){
  const z = document.getElementById('zlegend'); z.innerHTML = '<span style="color:var(--dim);font-size:11px">전세수급 구간:</span>';
  (meta.zones.jeonse_supply||[]).forEach(zn => {
    const s = document.createElement('span');
    s.className = 'zsw'; s.style.background = zn.color; s.textContent = zn.label;
    s.title = `${zn.label} (${zn.from}~${zn.to}): ${zn.desc}`;
    z.appendChild(s);
  });
}

const SIGCOLOR = {STRONG_BUY:'#22c55e', BUY:'#4ade80', WATCH:'#fbbf24',
                  NEUTRAL:'#94a3b8', SELL_RISK:'#f87171'};

async function selectRegion(region){
  selected = region; renderList();
  const r = allSignals.find(x => x.region===region);
  document.getElementById('sigbadge').innerHTML = `<b>${region}</b> ${badge(r.signal)}`;
  document.getElementById('reasons').innerHTML = `최신 ${meta.last_date} 기준`;
  const d = await (await fetch(`/api/series/${encodeURIComponent(region)}`)).json();
  drawChart(region, d.metrics, r);
}

function reasonGraphic(region, sig){
  const reasons = (sig['근거']||'').split(' · ').filter(Boolean);
  const head = `${region}  ▸  ${sig.signal}`;
  const lines = reasons.map(x => '• ' + x);
  const maxCh = Math.max(head.length, ...lines.map(l => l.length), 8);
  const W = Math.min(380, Math.max(190, Math.round(maxCh * 8.2) + 22));
  const H = 30 + lines.length * 17 + 12;
  return [{
    type:'group', left:56, top:30, z:100, silent:true,
    children:[
      {type:'rect', shape:{width:W, height:H, r:8},
       style:{fill:'rgba(15,17,21,0.85)', stroke:'#2b3340', lineWidth:1}},
      {type:'text', left:12, top:9,
       style:{text:head, fill:SIGCOLOR[sig.signal]||'#fff', font:'bold 14px sans-serif'}},
      {type:'text', left:12, top:32,
       style:{text:lines.join('\n'), fill:'#cbd5e1', fontSize:11.5, lineHeight:17}},
    ],
  }];
}

function drawChart(region, m, sig){
  const colors = {jeonse_supply:"#38bdf8", buyer_superiority:"#a78bfa", buyer_demand:"#f472b6",
                  sale_change:"#fbbf24", jeonse_change:"#34d399"};
  const series = [];
  const mk = (k, axis, extra={}) => {
    if(!m[k]) return;
    series.push({ name:m[k].label, type:'line', yAxisIndex:axis, showSymbol:false,
      lineStyle:{width:1.5}, itemStyle:{color:colors[k]},
      data:m[k].dates.map((dt,i)=>[dt, m[k].values[i]]), ...extra });
  };

  // 전세수급 구간 배경 밴드(색=강도) — 전세수급 시리즈에 markArea 부착
  const zones = meta.zones.jeonse_supply || [];
  const bandArea = m.jeonse_supply ? { silent:true, data: zones.map(z=>(
      [{yAxis:z.from, itemStyle:{color:z.color, opacity:0.16}}, {yAxis:z.to}])) } : undefined;

  mk("jeonse_supply", 0, bandArea ? { markArea: bandArea,
      markPoint:{ symbolSize:42, data:[{type:'max',label:{fontSize:10}}] } } : {});
  mk("buyer_superiority", 0, { markLine:{ symbol:'none', label:{position:'insideEndTop',fontSize:10},
      lineStyle:{type:'dashed',opacity:.4},
      data:[{yAxis:meta.zones.buyer_idx_strong, name:'매수우위 강세', lineStyle:{color:'#a78bfa'}}]}});
  mk("buyer_demand", 0, { markLine:{ symbol:'none', label:{position:'insideEndTop',fontSize:10},
      lineStyle:{type:'dashed',opacity:.4},
      data:[{yAxis:meta.zones.buyer_demand_buy, name:'매수신호', lineStyle:{color:'#4ade80'}}]}});
  mk("sale_change", 1);
  mk("jeonse_change", 1);

  const last = meta.last_date;
  const start = new Date(last); start.setFullYear(start.getFullYear()-3);
  const z0 = start.toISOString().slice(0,10);
  chart.setOption({
    tooltip:{ trigger:'axis' },
    legend:{ top:6, right:14, textStyle:{fontSize:11} },
    grid:{ left:46, right:52, top:40, bottom:64 },
    xAxis:{ type:'time' },
    yAxis:[ { name:'지수', min:0, max:200, splitLine:{lineStyle:{opacity:.12}} },
            { name:'증감%', splitLine:{show:false} } ],
    dataZoom:[ { type:'inside', startValue:z0, endValue:last },
               { type:'slider', startValue:z0, endValue:last, height:22, bottom:14 } ],
    graphic: sig ? reasonGraphic(region, sig) : [],
    series
  }, true);
}

async function doRefresh(){
  const btn = document.getElementById('refresh');
  btn.disabled = true; const old = btn.textContent; btn.textContent = '갱신 중…';
  try {
    const r = await (await fetch('/api/refresh', {method:'POST'})).json();
    await loadData();
    btn.textContent = `✓ ${r.last_date}`;
    setTimeout(()=>{ btn.textContent = old; btn.disabled = false; }, 2500);
  } catch(e) { btn.textContent = '갱신 실패'; setTimeout(()=>{ btn.textContent = old; btn.disabled = false; }, 2500); }
}

async function loadData(){
  meta = await (await fetch('/api/meta')).json();
  document.getElementById('date').textContent = `최신 ${meta.last_date}`;
  allSignals = await (await fetch('/api/signals')).json();
  renderZoneLegend(); renderList();
  const keep = selected && allSignals.find(r=>r.region===selected);
  selectRegion(keep ? selected : (allSignals.find(r=>active.has(r.signal))||allSignals[0]).region);
}

(async function init(){
  renderFilters();
  document.getElementById('search').oninput = renderList;
  await loadData();
})();
</script>
</body>
</html>
